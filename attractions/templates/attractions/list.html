{% extends "base.html" %}

{% block title %}Discover Kraków{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-6">Discover Kraków</h1>

  <form
    hx-get="{% url 'attraction-list' %}"
    hx-target="#filter-results"
    hx-trigger="change"
    hx-swap="innerHTML"
    method="get"
    class="mb-6"
  >
    {{ filter.form.as_p }}
    <button type="submit" class="sr-only">Filter</button>
  </form>

  <div id="filter-results">
    {% include "attractions/partials/filter_results.html" %}
  </div>
</div>
{% endblock %}
