{% extends "base.html" %}

{% block title %}Log In — Discover Kraków{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-sm p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Log in</h1>
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="space-y-4">
        {{ form.as_p }}
      </div>
      <button type="submit"
              class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
        Log in
      </button>
    </form>
    <p class="mt-4 text-sm text-gray-600">
      Don't have an account?
      <a href="{% url 'register' %}{% if next %}?next={{ next|urlencode }}{% endif %}" class="text-blue-600 hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
